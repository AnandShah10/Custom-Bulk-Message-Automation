<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMS Pro | Confirm Password Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f172a] text-white min-h-screen relative flex items-center justify-center font-inter p-4">
    <!-- Ambient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] right-[-10%] w-[50%] h-[50%] bg-blue-600/30 rounded-full blur-[120px]"></div>
    </div>

    <!-- Container -->
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl border border-white/10 relative overflow-hidden">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-green-500/20 text-green-400 p-3 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">New Password</h2>
            <p class="text-sm text-gray-400 mt-2 text-center">Please enter your new password below.</p>
        </div>

        <div id="noticeBanner" class="hidden mb-6 bg-blue-500/10 border border-blue-500/30 text-blue-400 text-sm p-3 rounded-lg text-center">
        </div>

        <!-- Form -->
        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">New Password</label>
                <div class="relative">
                    <input type="password" name="password" id="passwordInput" required minlength="8" placeholder="8+ characters"
                        class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 pr-12">
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors focus:outline-none">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.37.214 3.427.597M8.825 8.825a3 3 0 004.35 4.35m1.425 1.425L3 3m18 18l-6.75-6.75" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_-5px_rgba(59,130,246,0.5)] transition-all">
                Reset Password
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-8">
            <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Back to login</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const noticeBanner = document.getElementById('noticeBanner');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('hidden');
            eyeOffIcon.classList.toggle('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalText = submitBtn.textContent;
            submitBtn.textContent = "Updating...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const token = window.location.pathname.split('/').pop();

            try {
                const response = await fetch('/reset-password/' + token, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if(response.ok) {
                    noticeBanner.classList.remove('hidden');
                    noticeBanner.classList.replace('bg-blue-500/10', 'bg-green-500/10');
                    noticeBanner.classList.replace('text-blue-400', 'text-green-400');
                    noticeBanner.textContent = result.message + " Redirecting...";
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    noticeBanner.textContent = result.detail || "Error resetting password.";
                    noticeBanner.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (err) {
                noticeBanner.textContent = "An error occurred. Please try again.";
                noticeBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
