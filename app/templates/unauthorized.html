<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMS Pro | Unauthorized Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-[#0f172a] text-white min-h-screen relative flex items-center justify-center font-inter p-4">
    <!-- Ambient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-red-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-orange-600/10 rounded-full blur-[120px]">
        </div>
    </div>

    <!-- Content Container -->
    <div
        class="glass-panel w-full max-w-md rounded-3xl p-10 shadow-2xl border border-white/10 text-center relative overflow-hidden">
        <!-- Error Icon -->
        <div
            class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-500/10 border border-red-500/30 mb-8 animate-pulse">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-500 mb-4">403
        </h1>
        <h2 class="text-xl font-semibold mb-2">Access Denied</h2>
        <p class="text-gray-400 mb-8">
            Wait a minute! You don't have permission to access this area. This looks like an admin-only section.
        </p>

        <div class="space-y-4">
            <a href="/dashboard"
                class="block w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_-5px_rgba(59,130,246,0.5)] transition-all">
                Return to Dashboard
            </a>
            <form action="/auth/logout" method="POST" class="w-full mt-4">
                <button type="submit"
                    class="block w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-3 px-4 rounded-xl transition-all">Login
                    with Different Account</button>
            </form>
        </div>

        <div class="mt-8 pt-8 border-t border-white/5">
            <p class="text-xs text-gray-500 uppercase tracking-widest">Enterprise Security Active</p>
        </div>
    </div>
</body>

</html>
