<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMS Pro | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f172a] text-white min-h-screen relative flex items-center justify-center font-inter p-4">
    <!-- Ambient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] right-[-10%] w-[50%] h-[50%] bg-blue-600/30 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[50%] h-[50%] bg-purple-600/30 rounded-full blur-[120px]"></div>
    </div>

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl border border-white/10 relative overflow-hidden">
        <div class="flex flex-col items-center mb-8">
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Create Account</h2>
            <p class="text-sm text-gray-400 mt-1">Join CBMS Pro Enterprise Today</p>
        </div>

        <div id="errorBanner" class="hidden mb-6 bg-red-500/10 border border-red-500/30 text-red-400 text-sm p-3 rounded-lg text-center">
            Registration failed.
        </div>
        
        <div id="successBanner" class="hidden mb-6 glass-success text-green-400 text-sm p-3 rounded-lg text-center">
            Account created! Redirecting to dashboard...
        </div>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
                <input type="text" name="full_name" placeholder="John Doe"
                    class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email Statement</label>
                <input type="email" name="username" required placeholder="you@company.com"
                    class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="passwordInput" required minlength="8" placeholder="8+ characters"
                        class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 pr-12">
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors focus:outline-none">
                        <svg class="w-5 h-5 eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="w-5 h-5 eyeOffIcon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.37.214 3.427.597M8.825 8.825a3 3 0 004.35 4.35m1.425 1.425L3 3m18 18l-6.75-6.75" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirmPasswordInput" name="confirm_password" required minlength="8" placeholder="Repeat password"
                        class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 pr-12">
                    <button type="button" id="toggleConfirmPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors focus:outline-none">
                        <svg class="w-5 h-5 eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="w-5 h-5 eyeOffIcon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.37.214 3.427.597M8.825 8.825a3 3 0 004.35 4.35m1.425 1.425L3 3m18 18l-6.75-6.75" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="pt-2">
                <button type="submit" id="submitBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_-5px_rgba(168,85,247,0.5)] transition-all">
                    Register Account
                </button>
            </div>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-[#121c32] text-gray-500">Or continue with</span></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <a href="/auth/login/google" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl p-3 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </a>
            <a href="/auth/login/microsoft" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl p-3 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
                Microsoft
            </a>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8 mb-2">
            By registering, you agree to our <a href="/terms" class="text-blue-400 hover:text-blue-300">Terms</a> & <a href="/privacy" class="text-blue-400 hover:text-blue-300">Privacy Policy</a>.
        </p>

        <p class="text-center text-sm text-gray-400">
            Already have an account? <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign in</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorBanner = document.getElementById('errorBanner');
        const successBanner = document.getElementById('successBanner');

        // Toggle Logic Helper
        function setupToggle(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            const eye = btn.querySelector('.eyeIcon');
            const eyeOff = btn.querySelector('.eyeOffIcon');

            btn.addEventListener('click', () => {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                eye.classList.toggle('hidden');
                eyeOff.classList.toggle('hidden');
            });
        }

        setupToggle('togglePassword', 'passwordInput');
        setupToggle('toggleConfirmPassword', 'confirmPasswordInput');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBanner.classList.add('hidden');
            
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;
            
            if (password !== confirmPassword) {
                errorBanner.textContent = "Passwords do not match.";
                errorBanner.classList.remove('hidden');
                return;
            }

            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();

                if(response.ok) {
                    successBanner.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    errorBanner.textContent = result.detail || "Registration failed.";
                    errorBanner.classList.remove('hidden');
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorBanner.textContent = "Unable to connect to server. Check your internet.";
                errorBanner.classList.remove('hidden');
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
    {% include "support_widget.html" %}
    <script src="/static/support_bot.js"></script>
</body>
</html>
