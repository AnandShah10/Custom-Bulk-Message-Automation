<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMS Pro | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-[#0f172a] text-white min-h-screen relative flex items-center justify-center font-inter p-4">
    <!-- Ambient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] right-[-10%] w-[50%] h-[50%] bg-blue-600/30 rounded-full blur-[120px]"></div>
    </div>

    <!-- Container -->
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl border border-white/10 relative overflow-hidden">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-500/20 text-blue-400 p-3 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Reset Password</h2>
            <p class="text-sm text-gray-400 mt-2 text-center">Enter your email address and we will send you a link to reset your password temporarily.</p>
        </div>

        <div id="noticeBanner" class="hidden mb-6 bg-blue-500/10 border border-blue-500/30 text-blue-400 text-sm p-3 rounded-lg text-center">
        </div>

        <!-- Form -->
        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="you@company.com"
                    class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_-5px_rgba(59,130,246,0.5)] transition-all">
                Send Reset Link
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-8">
            Remembered your password? <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Back to login</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const noticeBanner = document.getElementById('noticeBanner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalText = submitBtn.textContent;
            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;

            const formData = new FormData(form);
            try {
                const response = await fetch('/password-reset', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                noticeBanner.textContent = result.message;
                noticeBanner.classList.remove('hidden');
                submitBtn.textContent = "Check Email";
            } catch (err) {
                noticeBanner.textContent = "An error occurred. Please try again.";
                noticeBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
