<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMS Pro | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-[#0f172a] text-white min-h-screen relative flex items-center justify-center font-inter p-4">
    <!-- Ambient Background -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/30 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-purple-600/30 rounded-full blur-[120px]">
        </div>
    </div>

    <!-- Login Container -->
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-2xl border border-white/10 relative overflow-hidden">
        <!-- Logo Header -->
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-12 h-12 rounded-xl bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Welcome
                Back</h2>
            <p class="text-sm text-gray-400 mt-1">Sign in to continue to CBMS Pro</p>
        </div>

        <div id="statusBanner"
            class="hidden mb-6 p-3 rounded-lg text-sm text-center border">
        </div>

        <!-- Classic Login Form -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                <input type="text" name="username" required
                    class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-400">Password</label>
                    <a href="/password-reset" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">Forgot
                        password?</a>
                </div>
                <div class="relative">
                    <input type="password" name="password" id="passwordInput" required
                        class="custom-input w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 pr-12">
                    <button type="button" id="togglePassword"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors focus:outline-none">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 1.274-4.057 5.064-7 9.542-7 1.225 0 2.37.214 3.427.597M8.825 8.825a3 3 0 004.35 4.35m1.425 1.425L3 3m18 18l-6.75-6.75" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Hidden MFA Field (Reveals if required) -->
            <div id="mfaGroup" class="hidden space-y-2 py-4 border-y border-white/5 my-2">
                <label id="mfaLabel" class="block text-sm font-medium text-purple-300 text-center">Authenticator Code (MFA)</label>
                
                <!-- 6-digit input for App/Email -->
                <div id="mfaOtpContainer">
                    <input type="text" name="mfa_code" id="mfa_code" placeholder="000000" maxlength="6"
                        class="w-full bg-purple-900/40 border border-purple-500/50 rounded-xl px-4 py-4 text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500/50 text-center tracking-[0.5em] text-2xl font-bold font-mono">
                    <div id="resendContainer" class="hidden mt-3 text-center">
                        <button type="button" id="btnResendMfa" class="text-xs text-blue-400 hover:text-blue-300 transition-colors underline">Didn't get the code? Resend to email</button>
                    </div>
                </div>

                <!-- Passkey Button -->
                <button type="button" id="btnPasskeyLogin" class="hidden w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-3">
                    <span class="text-2xl">🔑</span> Login with Passkey
                </button>

                <p id="mfaHint" class="text-xs text-gray-400 text-center italic mt-2">Check your app for the latest code.</p>
                
                <div id="mfaSwitchContainer" class="hidden mt-4 pt-4 border-t border-white/5 text-center">
                    <button type="button" id="btnSwitchMfa" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Try another way...</button>
                    <div id="mfaMethodsList" class="hidden mt-3 flex flex-col gap-2">
                        <!-- Methods populated via JS -->
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_20px_-5px_rgba(59,130,246,0.5)] transition-all">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-[#121c32] text-gray-500">Or continue
                    with</span></div>
        </div>

        <!-- OAuth Providers -->
        <div class="grid grid-cols-2 gap-3">
            <a href="/auth/login/google"
                class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl p-3 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Google
            </a>
            <a href="/auth/login/microsoft"
                class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl p-3 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 21 21">
                    <path fill="#f25022" d="M0 0h10v10H0z" />
                    <path fill="#7fba00" d="M11 0h10v10H11z" />
                    <path fill="#00a4ef" d="M0 11h10v10H0z" />
                    <path fill="#ffb900" d="M11 11h10v10H11z" />
                </svg>
                Microsoft
            </a>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8">
            Don't have an account? <a href="/signup"
                class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign up</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusBanner = document.getElementById('statusBanner');
        const mfaGroup = document.getElementById('mfaGroup');
        const mfaCodeInput = document.getElementById('mfa_code');
        let globalAvailableMethods = [];

        function showStatus(message, type = 'error') {
            statusBanner.textContent = message;
            statusBanner.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/30', 'text-red-400', 'bg-blue-500/10', 'border-blue-500/30', 'text-blue-400');
            
            if (type === 'error') {
                statusBanner.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
            } else {
                statusBanner.classList.add('bg-blue-500/10', 'border-blue-500/30', 'text-blue-400');
            }
            statusBanner.classList.remove('hidden');
        }

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Toggle icons
            eyeIcon.classList.toggle('hidden');
            eyeOffIcon.classList.toggle('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusBanner.classList.add('hidden');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Authenticating...";
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    window.location.href = '/dashboard';
                } else if (response.status === 401 && result.status === "mfa_required") {
                    // Reveal MFA UI
                    mfaGroup.classList.remove('hidden');
                    
                    const mfaType = result.mfa_type || 'app';
                    const label = document.getElementById('mfaLabel');
                    const hint = document.getElementById('mfaHint');
                    const otpContainer = document.getElementById('mfaOtpContainer');
                    const passkeyBtn = document.getElementById('btnPasskeyLogin');
                    const resendBox = document.getElementById('resendContainer');

                    otpContainer.classList.add('hidden');
                    passkeyBtn.classList.add('hidden');
                    resendBox.classList.add('hidden');

                    if (mfaType === 'app') {
                        label.innerText = "Authenticator App Code";
                        hint.innerText = "Open your app (Google Authenticator, Authy, etc) for the 6-digit code.";
                        otpContainer.classList.remove('hidden');
                        mfaCodeInput.focus();
                        showStatus("Please enter your Authenticator code.", "info");
                    } else if (mfaType === 'email') {
                        label.innerText = "Email Verification Code";
                        hint.innerText = "A 6-digit code was sent to your email address.";
                        otpContainer.classList.remove('hidden');
                        resendBox.classList.remove('hidden');
                        mfaCodeInput.focus();
                        showStatus("Check your email for the verification code.", "info");
                    } else if (mfaType === 'passkey') {
                        label.innerText = "Biometric Login";
                        hint.innerText = "Use your device's fingerprint, face, or PIN to continue.";
                        passkeyBtn.classList.remove('hidden');
                        showStatus("Click the button below to use your Passkey.", "info");
                        // Automatically trigger passkey if possible (optional)
                    }

                    submitBtn.innerText = mfaType === 'passkey' ? "Verify with Passkey" : "Complete Login";
                    if (mfaType === 'passkey') submitBtn.classList.add('hidden'); // Use the custom big button
                    else submitBtn.classList.remove('hidden');

                    // Setup Switcher
                    globalAvailableMethods = result.available_methods || ['app', 'email'];
                    updateMfaMethodsList(mfaType);
                    if (globalAvailableMethods.length > 1) {
                        document.getElementById('mfaSwitchContainer').classList.remove('hidden');
                    }

                } else if (response.status === 401 && result.detail === "invalid_mfa") {
                    showStatus("Invalid code. Please try again.", "error");
                } else {
                    showStatus(result.detail || "Login failed.", "error");
                    submitBtn.innerText = originalText;
                }
            } catch (err) {
                showStatus("Network error. Please try again.", "error");
                submitBtn.innerText = originalText;
            } finally {
                submitBtn.disabled = false;
            }
        });

        function updateMfaMethodsList(currentType) {
            const list = document.getElementById('mfaMethodsList');
            list.innerHTML = '';
            globalAvailableMethods.forEach(m => {
                if (m === currentType) return;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = "text-[11px] py-2.5 px-3 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors text-gray-300 flex items-center justify-center gap-2 capitalize active:scale-95";
                const icon = m === 'app' ? '📱' : (m === 'email' ? '📧' : '🔑');
                btn.innerHTML = `${icon} Use ${m === 'app' ? 'Authenticator App' : (m === 'email' ? 'Email Code' : 'Passkey')}`;
                btn.onclick = () => switchMfaUI(m);
                list.appendChild(btn);
            });
        }

        function switchMfaUI(mfaType) {
            const label = document.getElementById('mfaLabel');
            const hint = document.getElementById('mfaHint');
            const otpContainer = document.getElementById('mfaOtpContainer');
            const passkeyBtn = document.getElementById('btnPasskeyLogin');
            const resendBox = document.getElementById('resendContainer');
            const list = document.getElementById('mfaMethodsList');
            const switchBtn = document.getElementById('btnSwitchMfa');

            otpContainer.classList.add('hidden');
            passkeyBtn.classList.add('hidden');
            resendBox.classList.add('hidden');
            list.classList.add('hidden');
            switchBtn.classList.remove('hidden');
            
            // Update the list for next time
            updateMfaMethodsList(mfaType);

            if (mfaType === 'app') {
                label.innerText = "Authenticator App Code";
                hint.innerText = "Open your app for the 6-digit code.";
                otpContainer.classList.remove('hidden');
                mfaCodeInput.focus();
                showStatus("Authenticator mode active.", "info");
            } else if (mfaType === 'email') {
                label.innerText = "Email Verification Code";
                hint.innerText = "Check your email for the 6-digit code.";
                otpContainer.classList.remove('hidden');
                resendBox.classList.remove('hidden');
                mfaCodeInput.focus();
                showStatus("Email OTP mode active. Check your inbox.", "info");
            } else if (mfaType === 'passkey') {
                label.innerText = "Biometric Login";
                hint.innerText = "Use your device's fingerprint or face to continue.";
                passkeyBtn.classList.remove('hidden');
                showStatus("Passkey mode active. Click below to scan.", "info");
            }

            submitBtn.innerText = mfaType === 'passkey' ? "Verify with Passkey" : "Complete Login";
            if (mfaType === 'passkey') submitBtn.classList.add('hidden');
            else submitBtn.classList.remove('hidden');
        }

        document.getElementById('btnSwitchMfa').addEventListener('click', () => {
            const list = document.getElementById('mfaMethodsList');
            const btn = document.getElementById('btnSwitchMfa');
            list.classList.toggle('hidden');
            btn.classList.add('hidden');
        });

        // Resend MFA Email
        document.getElementById('btnResendMfa').addEventListener('click', async () => {
             const formData = new FormData(form);
             try {
                const res = await fetch('/auth/resend-mfa', { method: 'POST', body: formData });
                const data = await res.json();
                if(res.ok) {
                    showStatus("New code sent to your email!", "info");
                } else {
                    showStatus(data.detail, "error");
                }
             } catch(e) { showStatus("Failed to resend.", "error"); }
        });

        // Passkey Login Logic
        document.getElementById('btnPasskeyLogin').addEventListener('click', async () => {
             const username = document.getElementsByName('username')[0].value;
             if(!username) {
                 showStatus("Please enter your email first.", "error");
                 return;
             }
             
             try {
                 const res = await fetch(`/auth/passkey/login/options?username=${encodeURIComponent(username)}`);
                 const options = await res.json();

                 const bufferDecode = (value) => {
                    return Uint8Array.from(atob(value.replace(/-/g, "+").replace(/_/g, "/")), c => c.charCodeAt(0));
                 };

                 options.challenge = bufferDecode(options.challenge);
                 if (options.allowCredentials) {
                    options.allowCredentials.forEach(c => c.id = bufferDecode(c.id));
                 }

                 const credential = await navigator.credentials.get({ publicKey: options });

                 const bufferEncode = (value) => {
                    return btoa(String.fromCharCode.apply(null, new Uint8Array(value)))
                        .replace(/\+/g, "-")
                        .replace(/\//g, "_")
                        .replace(/=/g, "");
                 };

                 const verificationData = {
                    id: credential.id,
                    rawId: bufferEncode(credential.rawId),
                    type: credential.type,
                    response: {
                        authenticatorData: bufferEncode(credential.response.authenticatorData),
                        clientDataJSON: bufferEncode(credential.response.clientDataJSON),
                        signature: bufferEncode(credential.response.signature),
                        userHandle: credential.response.userHandle ? bufferEncode(credential.response.userHandle) : null,
                    },
                 };

                 const verifyRes = await fetch('/auth/passkey/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(verificationData)
                 });

                 if(verifyRes.ok) {
                    window.location.href = '/dashboard';
                 } else {
                    const data = await verifyRes.json();
                    showStatus(data.detail, "error");
                 }

             } catch(e) {
                console.error(e);
                showStatus("Passkey login failed or cancelled.", "error");
             }
        });
    </script>
    {% include "support_widget.html" %}
    <script src="/static/support_bot.js"></script>
</body>

</html>
